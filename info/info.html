<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>呂佳嬡 · 數位名片</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F5ECEA; --card: #FBF7F6; --text-primary: #2A1E1C;
      --text-secondary: #8C6B68; --accent: #A0524C; --border: #EAD8D5;
      --btn-bg: #EED9D6; --btn-hover: #E4C9C5; --shadow: rgba(160,82,76,0.12);
    }
    html, body {
      min-height: 100%;
      font-family: 'Noto Serif TC', serif;
      background-color: var(--bg);
      color: var(--text-primary);
      user-select: none;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.6;
    }
    .page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem; position: relative; z-index: 1;
    }

    /* ── FLIP CONTAINER ── */
    .card-scene {
      width: 100%; max-width: 400px;
      perspective: 1200px;
      cursor: pointer;
    }
    .card-wrap {
      width: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.75s cubic-bezier(0.4, 0.2, 0.2, 1);
    }
    .card-wrap.flipped { transform: rotateY(180deg); }

    .card-front,
    .card-back {
      width: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 6px 36px var(--shadow), 0 1px 6px var(--shadow);
    }
    /* back stacks on top of front via absolute */
    .card-back {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      transform: rotateY(180deg);
    }
    /* front sets the height for the whole flip container */
    .card-front { position: relative; z-index: 1; }

    /* ── FRONT INNER ── */
    .card-front-inner {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem 2.5rem;
      display: flex; flex-direction: column; align-items: center;
    }
    .avatar-wrap { position: relative; width: 96px; height: 96px; margin-bottom: 1.5rem; }
    .avatar {
      width: 96px; height: 96px; border-radius: 50%;
      background: var(--btn-bg); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .avatar svg { width: 52px; height: 52px; opacity: 0.32; }
    .avatar-ring {
      position: absolute; inset: -5px; border-radius: 50%;
      border: 1.5px dashed var(--border);
      animation: spin 18s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .name {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem; font-weight: 400; letter-spacing: 0.04em;
      color: var(--text-primary); text-align: center; line-height: 1.2; margin-bottom: 0.6rem;
    }
    .subtitle {
      font-family: 'Noto Serif TC', serif;
      font-size: 0.82rem; font-weight: 300; color: var(--text-secondary);
      text-align: center; line-height: 1.7; letter-spacing: 0.03em;
    }
    .subtitle .hl { color: var(--accent); font-weight: 600; }
    .divider { width: 100%; height: 1px; background: var(--border); margin: 1.5rem 0; }
    .links { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; }
    .link-btn {
      display: flex; align-items: center; gap: 0.75rem;
      background: var(--btn-bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.8rem 1.2rem;
      color: var(--text-primary); text-decoration: none;
      font-family: 'DM Mono', monospace; font-size: 0.78rem; letter-spacing: 0.04em;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      position: relative;
    }
    .link-btn::after { content: '↗'; position: absolute; right: 1.2rem; font-size: 0.85rem; opacity: 0.4; transition: opacity 0.2s, transform 0.2s; }
    .link-btn:hover { background: var(--btn-hover); border-color: var(--accent); transform: translateX(3px); }
    .link-btn:hover::after { opacity: 0.8; transform: translate(2px, -2px); }
    .link-btn .ico { width: 28px; height: 28px; border-radius: 7px; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .link-btn .ico svg { width: 15px; height: 15px; }
    .flip-hint {
      margin-top: 1.5rem;
      font-family: 'DM Mono', monospace; font-size: 0.68rem;
      color: var(--text-secondary); letter-spacing: 0.08em;
      opacity: 0.45; display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: opacity 0.2s;
    }
    .flip-hint:hover { opacity: 0.8; }
    .flip-hint svg { width: 13px; height: 13px; }

    /* ── BACK INNER ── */
    .card-back-inner {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%; height: 100%;
      display: flex; align-items: stretch;
      overflow: hidden; position: relative;
    }
    /* ★★★ 換圖：把 src="" 填入你的圖片路徑 ★★★ */
    .back-image {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      min-height: 480px;
    }
    .back-close {
      position: absolute; top: 1rem; right: 1rem;
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--btn-bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s, border-color 0.2s; z-index: 2;
    }
    .back-close:hover { background: var(--btn-hover); border-color: var(--accent); }
    .back-close svg { width: 14px; height: 14px; opacity: 0.6; }
  </style>
</head>
<body>
<div class="page">
  <div class="card-scene" id="scene">
    <div class="card-wrap" id="cardWrap">

      <!-- ══ FRONT ══ -->
      <div class="card-front">
        <div class="card-front-inner">
          <div class="avatar-wrap">
            <div class="avatar-ring"></div>
            <div class="avatar">
              <img src="avatar.png" alt="呂佳嬡" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>
            </div>
          </div>
          <h1 class="name">呂佳嬡</h1>
          <p class="subtitle">熱愛 <span class="hl">咖啡</span> 的<br/><span class="hl">長榮大學</span> 在讀大學生 ✨</p>
          <div class="divider"></div>
          <div class="links">
            <a class="link-btn" href="https://instagram.com" target="_blank" rel="noopener" onclick="event.stopPropagation()">
              <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg></span>
              instagram
            </a>
            <a class="link-btn" href="https://github.com" target="_blank" rel="noopener" onclick="event.stopPropagation()">
              <span class="ico"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg></span>
              github
            </a>
            <a class="link-btn" href="mailto:your@email.com" onclick="event.stopPropagation()">
              <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg></span>
              email
            </a>
          </div>
          <div class="flip-hint" id="flipBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            點擊翻轉名片
          </div>
        </div>
      </div>

      <!-- ══ BACK ══ -->
      <div class="card-back">
        <div class="card-back-inner">
          <!-- ★★★ 將 src="" 換成你的圖片路徑，例如 src="info/coffee.jpg" ★★★ -->
          <img class="back-image" src="coffee.png" alt="封面照片"
              onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"/>
          <!-- 圖片載入失敗時顯示的佔位符 -->
          <div style="display:none; width:100%; min-height:480px; background:linear-gradient(135deg,#EED9D6,#DDB8B4); flex-direction:column; align-items:center; justify-content:center; gap:1rem;">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="4" y="8" width="40" height="32" rx="4" stroke="#8C6B68" stroke-width="2"/><circle cx="16" cy="20" r="4" stroke="#8C6B68" stroke-width="2"/><path d="M4 36l10-10 8 8 6-6 16 12" stroke="#8C6B68" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <p style="font-family:'DM Mono',monospace; font-size:0.7rem; color:#8C6B68; letter-spacing:0.1em; text-align:center; line-height:1.9;">將圖片路徑填入<br/>src="" 的引號內</p>
          </div>
          <div class="back-close" id="closeBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  const wrap     = document.getElementById('cardWrap');
  const flipBtn  = document.getElementById('flipBtn');
  const closeBtn = document.getElementById('closeBtn');

  // 點擊名片正面翻轉
  wrap.addEventListener('click', function() {
    wrap.classList.toggle('flipped');
  });

  // 點擊「翻轉」提示也觸發
  flipBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    wrap.classList.toggle('flipped');
  });

  // 點擊 ✕ 翻回正面
  closeBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    wrap.classList.remove('flipped');
  });

  // 社群連結不觸發翻轉（已在 HTML 加 stopPropagation）
</script>
</body>
</html>
